<html lang="en">
<head>

<title>CaseOutliner — Criminal Procedure Study Tool</title>
<style>

  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: #e2ddd5;
    --text: #2c2416;
    --text-secondary: #6b5e4f;
    --accent: #8b5e3c;
    --accent-light: #d4a574;
    --accent-bg: #f5ebe0;
    --tag-4th: #2d6a4f;
    --tag-4th-bg: #d8f3dc;
    --tag-5th: #1d3557;
    --tag-5th-bg: #d6e4f0;
    --tag-6th: #6b2737;
    --tag-6th-bg: #f2d0d9;
    --tag-14th: #5a189a;
    --tag-14th-bg: #e8d5f5;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

  }

  body {

  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header p {
    opacity: 0.8;
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }

  .export-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 0.5rem 1.1rem;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }

  .export-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
  }

  .export-btn svg {
    width: 16px;
    height: 16px;
  }

  .app-layout {
    display: grid;
    grid-template-columns: 300px 1fr 400px;

  }

  .sidebar {

    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
  }

  .sidebar h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    padding: 0.5rem 1.2rem;
    margin-bottom: 0.25rem;
  }

  .topic-item {
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    font-size: 0.9rem;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .topic-item:hover { background: var(--accent-bg); }
  .topic-item.active {
    background: var(--accent-bg);
    border-left-color: var(--accent);
    font-weight: 600;
  }

  .topic-item .arrow {
    font-size: 0.65rem;
    color: var(--text-secondary);
    transition: transform 0.2s;
    width: 12px;
    flex-shrink: 0;
  }

  .topic-item.expanded .arrow { transform: rotate(90deg); }

  .subtopic-item {
    padding: 0.35rem 1.2rem 0.35rem 2.8rem;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-secondary);
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .subtopic-item:hover { background: var(--accent-bg); color: var(--text); }
  .subtopic-item.active {
    background: var(--accent-bg);
    border-left-color: var(--accent-light);
    color: var(--text);
    font-weight: 500;
  }

  .subtopics { display: none; }
  .subtopics.open { display: block; }

  .main-panel {
    overflow-y: auto;
    padding: 1.5rem;
  }

  .main-panel h2 {
    font-family: 'Lora', serif;
    font-size: 1.3rem;
    margin-bottom: 0.3rem;
  }

  .main-panel .subtitle {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 1.2rem;
  }

  .case-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }

  .case-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: var(--accent-light);
  }

  .case-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--shadow-lg);
  }

  .case-card .case-name {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.25rem;
  }

  .case-card .case-cite {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
  }

  .case-card .case-snippet {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .tags {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.68rem;
    padding: 0.15rem 0.5rem;
    border-radius: 99px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .tag-4th { background: var(--tag-4th-bg); color: var(--tag-4th); }
  .tag-5th { background: var(--tag-5th-bg); color: var(--tag-5th); }
  .tag-6th { background: var(--tag-6th-bg); color: var(--tag-6th); }
  .tag-14th { background: var(--tag-14th-bg); color: var(--tag-14th); }
  .tag-landmark { background: #fff3cd; color: #856404; }

  .detail-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem;
  }

  .detail-panel .empty-state {
    text-align: center;
    color: var(--text-secondary);
    margin-top: 4rem;
    font-size: 0.9rem;
  }

  .detail-panel .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  .detail-header {
    margin-bottom: 1.2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .detail-header h3 {
    font-family: 'Lora', serif;
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .detail-header .cite {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 0.2rem;
  }

  .detail-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-top: 0.6rem;
  }

  .meta-item {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .meta-item strong {
    color: var(--text);
    font-weight: 600;
  }

  .detail-section {
    margin-bottom: 1.2rem;
  }

  .detail-section h4 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 0.4rem;
    font-weight: 600;
  }

  .detail-section p, .detail-section ul {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
  }

  .detail-section ul {
    padding-left: 1.2rem;
  }

  .detail-section li {
    margin-bottom: 0.3rem;
  }

  .holding-box {
    background: var(--accent-bg);
    border-left: 3px solid var(--accent);
    padding: 0.8rem 1rem;
    border-radius: 0 6px 6px 0;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    line-height: 1.5;
    font-style: italic;
  }

  .quote-box {
    background: #f8f6f3;
    border-left: 3px solid #c4b5a3;
    padding: 0.6rem 0.9rem;
    border-radius: 0 6px 6px 0;
    font-family: 'Lora', serif;
    font-size: 0.84rem;
    line-height: 1.5;
    font-style: italic;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }

  .quote-box .attribution {
    font-style: normal;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    color: #999;
    margin-top: 0.3rem;
  }

  .related-cases {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .related-case {
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .related-case:hover {
    border-color: var(--accent-light);
    background: var(--accent-bg);
  }

  .add-note {
    width: 100%;
    border: 1px dashed var(--border);
    background: transparent;
    padding: 0.6rem;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .add-note:hover {
    border-color: var(--accent-light);
    color: var(--text);
    background: var(--accent-bg);
  }

  textarea.note-input {
    width: 100%;
    border: 1px solid var(--accent-light);
    background: var(--accent-bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
  }

  .note-text {
    font-size: 0.82rem;
    color: var(--text);
    background: #fafaf7;
    padding: 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
    cursor: pointer;
  }

  .note-text:hover {
    border-color: var(--accent-light);
  }

  .class-note {
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
    background: #f0f4ff;
    border-left: 3px solid #5b7fb5;
    padding: 0.5rem 0.8rem;
    border-radius: 0 6px 6px 0;
    margin-bottom: 0.5rem;
  }

  .search-bar {
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .search-bar input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-bar input:focus {
    border-color: var(--accent);
  }

  .search-bar input::placeholder {
    color: #b0a898;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>CaseOutliner</h1>
    <p>Criminal Procedure — Case Law Study Tool</p>
  </div>
  <button class="export-btn" onclick="exportToWord()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Export to PDF
  </button>
</header>

<div class="app-layout">
  <div class="sidebar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search cases..." oninput="filterCases(this.value)">
    </div>
    <h2>Outline Topics</h2>
    <div id="topicTree"></div>
  </div>

  <div class="main-panel" id="mainPanel">
    <h2 id="topicTitle">All Cases</h2>
    <p class="subtitle" id="topicSubtitle">Select a topic from the sidebar to filter, or browse all cases below.</p>
    <div id="caseList"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="icon">&#9878;</div>
      <p>Select a case to view its<br>outline and key details</p>
    </div>
  </div>
</div>

<script>
const DATA = {

  cases: [

      subtopic: "Exclusionary Rule",
      tags: ["4th Amend", "Landmark"],
      vote: "6-3",
      author: "Justice Clark",
      facts: "On May 23, 1957, three Cleveland police officers arrived at Dollree Mapp's home based on a tip that a suspect in a recent bombing was hiding there, along with illegal betting equipment. Mapp refused to admit them without a warrant after calling her attorney. Three hours later, additional officers arrived and forced open a door. When Mapp demanded to see a warrant, an officer held up a paper claiming it was one; Mapp grabbed it and placed it in her bosom. Officers retrieved it and handcuffed her for being 'belligerent.' They searched the entire house — including dresser drawers, closets, suitcases, a child's bedroom, and the basement — finding obscene materials but no bombing suspect or betting equipment. No valid warrant was ever produced at trial. Mapp was convicted of possessing obscene materials under Ohio law.",
      proceduralHistory: "Mapp was convicted in the Court of Common Pleas of Cuyahoga County. The Ohio Court of Appeals affirmed. The Ohio Supreme Court affirmed (finding the methods used to obtain evidence 'unlawful' but holding exclusion was not constitutionally required). The U.S. Supreme Court granted certiorari.",

    {

      facts: "Charles Katz was a well-known Los Angeles handicapper who used a public telephone booth on Sunset Boulevard to transmit betting information to clients in other cities. FBI agents, suspecting Katz of illegal gambling transmissions, attached an electronic listening and recording device to the outside of the phone booth he regularly used. Over a period of about two weeks, the agents recorded Katz's end of telephone conversations. The recordings were used to convict Katz of transmitting wagering information by telephone in violation of federal law. The government argued no warrant was needed because (1) the booth was partly glass and Katz was visible inside, (2) the listening device was placed on the outside of the booth (no physical trespass), and (3) a public phone booth is not a constitutionally protected area.",

      author: "Chief Justice Warren",
      facts: "On March 13, 1963, Ernesto Miranda was arrested at his home in Phoenix, Arizona, on suspicion of kidnapping and rape. He was taken to a police station, placed in an interrogation room, and questioned by two officers for approximately two hours. Miranda was not informed of his right to have an attorney present or his right to remain silent before or during the interrogation. At the end of the questioning, Miranda signed a written confession that included a typed paragraph stating the confession was made 'with full knowledge of my legal rights, understanding any statement I make may be used against me.' The confession was used at trial, and Miranda was convicted of kidnapping and rape, sentenced to 20-30 years on each count. The case was consolidated with three companion cases (Vignera v. New York, Westover v. United States, and California v. Stewart) involving similar custodial interrogation issues.",
      proceduralHistory: "Miranda was convicted in the Superior Court of Arizona, Maricopa County. The Arizona Supreme Court affirmed the conviction, holding that Miranda's constitutional rights were not violated because he did not specifically request an attorney. The U.S. Supreme Court granted certiorari and consolidated the case with three companion cases.",
      holding: "Prior to any custodial interrogation, a suspect must be clearly informed: (1) of the right to remain silent, (2) that any statement made can and will be used against them in court, (3) of the right to have an attorney present during questioning, and (4) that if they cannot afford an attorney, one will be appointed before questioning if they so desire. If the suspect indicates at any point that they wish to remain silent or want an attorney, interrogation must cease.",
      reasoning: [
        "Custodial interrogation is inherently coercive: the 'police-dominated atmosphere' generates compelling pressures that 'work to undermine the individual's will to resist'",
        "The Court reviewed police interrogation manuals (including Inbau & Reid) in detail, documenting psychological tactics designed to overbear a suspect's will",
        "The Fifth Amendment privilege against compulsory self-incrimination requires adequate procedural safeguards when a suspect is in custody",
        "Warnings are necessary to dispel the compulsion inherent in custodial settings and make the suspect aware of rights they may not know",
        "A suspect may waive these rights, but any waiver must be made voluntarily, knowingly, and intelligently — a heavy burden rests on the government to demonstrate waiver",
        "Silence after warnings cannot be used as evidence of guilt",
        "The decision does not prevent voluntary, uncoerced statements; it only requires that suspects be informed of their rights in custodial settings"
      ],
      keyQuotes: [
        { text: "Prior to any questioning, the person must be warned that he has a right to remain silent, that any statement he does make may be used as evidence against him, and that he has a right to the presence of an attorney, either retained or appointed.", attribution: "Chief Justice Warren, majority opinion" },
        { text: "If the individual indicates in any manner, at any time prior to or during questioning, that he wishes to remain silent, the interrogation must cease.", attribution: "Chief Justice Warren, majority opinion" },
        { text: "The prosecution may not use statements, whether exculpatory or inculpatory, stemming from custodial interrogation of the defendant unless it demonstrates the use of procedural safeguards effective to secure the privilege against self-incrimination.", attribution: "Chief Justice Warren, majority opinion" }
      ],
      significance: "Established the famous 'Miranda warnings' required before custodial interrogation. Perhaps the most well-known Supreme Court decision in criminal law, fundamentally reshaping police procedure nationwide. The warnings became a cultural touchstone, familiar to virtually all Americans through television and film. Miranda was retried without the confession, convicted again, and paroled in 1972. He was stabbed to death in a bar fight in 1976; the suspect in his killing was read his Miranda rights and chose to remain silent.",
      dissent: "Justice Harlan, joined by Justices Stewart and White, dissented sharply, calling the decision 'a hazardous experimentation' with the criminal justice system. Harlan argued the voluntariness standard under the Due Process Clause was sufficient and warned the decision would 'return a killer, a rapist or other criminal to the streets.' Justice White also dissented separately, predicting the decision would lead to fewer confessions and more unsolved crimes. Justice Clark dissented in part.",
      relatedCases: ["Escobedo v. Illinois (1964)", "Dickerson v. United States (2000)", "Berghuis v. Thompkins (2010)", "Missouri v. Seibert (2004)"]
    },
    {
      name: "Gideon v. Wainwright",
      cite: "372 U.S. 335 (1963)",
      year: 1963,
      topic: "Sixth Amendment — Right to Counsel",
      subtopic: "Right to Appointed Counsel",
      tags: ["6th Amend", "Landmark"],
      vote: "9-0",
      author: "Justice Black",
      facts: "On June 3, 1961, someone broke into the Bay Harbor Pool Room in Panama City, Florida, smashing a door, breaking into a cigarette machine and jukebox, and stealing beer, wine, Coca-Cola, and coins from the machines. A witness reported seeing Clarence Earl Gideon in the pool room around 5:30 a.m. with a wine bottle and money in his pockets. Gideon, a 51-year-old white man with a prior criminal record who had been in and out of prisons for much of his life, was arrested and charged with felony breaking and entering with intent to commit petty larceny. At trial, Gideon appeared without a lawyer and asked the court to appoint one for him. The judge denied the request, explaining that under Florida law, appointed counsel was provided only in capital cases. Gideon responded: 'The United States Supreme Court says I am entitled to be represented by counsel.' He was forced to conduct his own defense — making an opening statement, cross-examining witnesses, calling witnesses, and making closing arguments. The jury found him guilty, and he was sentenced to five years in prison.",
      proceduralHistory: "Gideon was convicted in the Circuit Court of Bay County, Florida. He filed a habeas corpus petition with the Florida Supreme Court, which denied relief without opinion. Gideon then filed a handwritten, in forma pauperis petition for certiorari with the U.S. Supreme Court, written in pencil from prison. The Court granted certiorari and appointed Abe Fortas (later a Supreme Court Justice) to argue Gideon's case.",
      holding: "The Sixth Amendment's guarantee of the right to counsel is a fundamental right, essential to a fair trial, and is obligatory upon the states through the Fourteenth Amendment. States must provide appointed counsel to indigent defendants charged with serious criminal offenses.",
      reasoning: [
        "Overruled Betts v. Brady (1942), which held that appointed counsel was only required in 'special circumstances' (complexity of charges, illiteracy of defendant, etc.)",
        "The right to counsel is 'fundamental and essential to fair trials in this country' — not just a procedural nicety",
        "'Lawyers in criminal courts are necessities, not luxuries' — the government hires attorneys to prosecute, and defendants who can afford it never fail to hire them",
        "Without counsel, even an intelligent, educated layperson 'lacks both the skill and knowledge adequately to prepare his defense'",
        "The original intent of the Framers supports the right, as the Sixth Amendment was adopted precisely because the Founders knew fair trials required the assistance of counsel",
        "In practice, Betts had already been eroded: since 1950, no case had actually applied the 'special circumstances' rule to deny counsel"
      ],
      keyQuotes: [
        { text: "Reason and reflection require us to recognize that in our adversary system of criminal justice, any person haled into court, who is too poor to hire a lawyer, cannot be assured a fair trial unless counsel is provided for him.", attribution: "Justice Black, majority opinion" },
        { text: "Lawyers to prosecute are everywhere deemed essential to protect the public's interest in an orderly society. That government hires lawyers to prosecute and defendants who have the money hire lawyers to defend are the strongest indications that lawyers in criminal courts are necessities, not luxuries.", attribution: "Justice Black, majority opinion" }
      ],
      significance: "Guaranteed the right to a court-appointed lawyer for all felony defendants who cannot afford one. Led directly to the creation of public defender offices across the country. Gideon was retried with appointed counsel (local attorney W. Fred Turner), and the jury acquitted him in just over an hour. The case became the subject of Anthony Lewis's celebrated book 'Gideon's Trumpet' (1964). Later extended to misdemeanors carrying jail time in Argersinger v. Hamlin (1972).",
      dissent: "The decision was unanimous (9-0). Justice Harlan wrote a notable concurrence, agreeing with the result but disagreeing with the majority's reasoning. He argued that Betts v. Brady was an 'anachronism' that had already been substantially eroded, and that the Court should simply acknowledge this rather than applying the incorporation doctrine broadly.",

    {
      name: "Strickland v. Washington",

      topic: "Sixth Amendment — Right to Counsel",

      tags: ["6th Amend"],
      vote: "8-1",
      author: "Justice O'Connor",
      facts: "In 1976, David Washington went on a 10-day crime spree in the Miami, Florida area. He committed three groups of crimes: a kidnapping, stabbing, and attempted murder; a robbery, kidnapping, and attempted murder; and a burglary, robbery, and murder. After his accomplices were arrested, Washington surrendered, gave a lengthy statement confessing to the three capital murders, and against his attorney's advice, pled guilty to all charges including three capital murder counts. His court-appointed lawyer, William Tunkey, actively prepared for the sentencing hearing. However, when Washington told Tunkey about his dire financial straits and emotional state, the attorney made several strategic decisions: he chose not to seek out character witnesses (believing Washington's criminal history would undermine their testimony), did not request a psychiatric examination (fearing it would be counterproductive), and did not investigate Washington's background for mitigating factors. At sentencing, the judge found 'numerous aggravating circumstances and no (or insufficient) mitigating circumstances' and sentenced Washington to death on each murder count.",
      proceduralHistory: "Washington was sentenced to death in the Dade County Circuit Court. The Florida Supreme Court affirmed. Washington then filed a habeas corpus petition in U.S. District Court, which denied relief. The Fifth Circuit Court of Appeals (en banc) reversed, articulating a multi-factor standard for ineffective assistance. The U.S. Supreme Court granted certiorari to establish a uniform standard.",
      holding: "To establish ineffective assistance of counsel in violation of the Sixth Amendment, a defendant must show: (1) Deficient Performance — counsel's representation fell below an objective standard of reasonableness as measured by prevailing professional norms; AND (2) Prejudice — there is a reasonable probability that, but for counsel's unprofessional errors, the result of the proceeding would have been different. A 'reasonable probability' is one sufficient to undermine confidence in the outcome.",
      reasoning: [
        "The purpose of the Sixth Amendment guarantee is to ensure the defendant receives a fair trial — 'a trial whose result is reliable'",
        "Courts must judge counsel's conduct by the 'prevailing professional norms' at the time of representation, not in hindsight",
        "There is a 'strong presumption that counsel's conduct falls within the wide range of reasonable professional assistance' — courts must be 'highly deferential' to counsel's decisions",
        "Strategic decisions made after thorough investigation are 'virtually unchallengeable'; strategic decisions after limited investigation are reasonable only to the extent the limitations were reasonable",
        "The prejudice prong requires more than showing the errors had 'some conceivable effect' — the defendant must show a reasonable probability of a different outcome",
        "The two prongs may be addressed in either order; if one is not met, the court need not consider the other"
      ],
      keyQuotes: [
        { text: "The benchmark for judging any claim of ineffectiveness must be whether counsel's conduct so undermined the proper functioning of the adversarial process that the trial cannot be relied on as having produced a just result.", attribution: "Justice O'Connor, majority opinion" },
        { text: "Judicial scrutiny of counsel's performance must be highly deferential... Because of the difficulties inherent in making the evaluation, a court must indulge a strong presumption that counsel's conduct falls within the wide range of reasonable professional assistance.", attribution: "Justice O'Connor, majority opinion" }
      ],
      significance: "Established the two-prong test that remains the governing standard for all ineffective assistance of counsel claims. The high bar — especially the prejudice requirement — has been widely criticized as nearly impossible to meet, effectively insulating all but the most egregious attorney errors from reversal. Despite criticism, the standard has been consistently reaffirmed and applied to plea bargaining (Lafler v. Cooper, 2012), capital cases (Wiggins v. Smith, 2003), and immigration consequences (Padilla v. Kentucky, 2010).",
      dissent: "Justice Marshall was the sole dissenter. He argued the standard was fatally flawed: the performance prong's 'wide range of reasonable professional assistance' was too deferential, and the prejudice prong improperly shifted the focus from attorney competence to outcome. Marshall predicted the test would fail to protect defendants from genuinely incompetent lawyering in all but the most extreme cases.",

    {

      tags: ["4th Amend"],

      author: "Chief Justice Roberts",
      facts: "In April 2011, police arrested four men suspected of committing a series of armed robberies of Radio Shack and T-Mobile stores in the Detroit area. One suspect confessed and gave the FBI his own cell phone number and the numbers of other participants, including Timothy Carpenter. The FBI then applied for and received court orders under the Stored Communications Act (SCA) — which requires only 'reasonable grounds' (less than probable cause) — to obtain cell-site location information (CSLI) from Carpenter's wireless carriers, MetroPCS and Sprint. The carriers produced 127 days of historical CSLI for Carpenter, comprising 12,898 location data points — an average of 101 data points per day. This data placed Carpenter's phone near four of the robbery locations at the time they occurred. At trial, the government's expert produced maps showing that Carpenter's phone was within a half-mile to two miles of the robbery locations during the relevant times. Carpenter was convicted of six counts of robbery and sentenced to more than 100 years in prison.",

      keyQuotes: [

        { text: "We decline to grant the state unrestricted access to a wireless carrier's database of physical location information.", attribution: "Chief Justice Roberts, majority opinion" }
      ],
      significance: "Extended Fourth Amendment protections to digital-age surveillance, signaling that the third-party doctrine has limits when applied to pervasive digital records. The decision is a landmark in digital privacy law, though its deliberately narrow scope leaves many questions open for future cases (real-time tracking, smart home data, wearable devices, etc.).",
      dissent: "Four justices dissented in separate opinions. Justice Kennedy argued the third-party doctrine should apply straightforwardly. Justice Thomas argued the Fourth Amendment's original meaning does not support the Katz 'reasonable expectation of privacy' test at all. Justice Alito warned the majority's approach would 'guarantee a blizzard of litigation' over what digital records require warrants. Justice Gorsuch, while dissenting, suggested a property-rights based approach might better protect digital privacy than Katz.",

    {
      name: "Brady v. Maryland",
      cite: "373 U.S. 83 (1963)",

      topic: "Fourteenth Amendment — Due Process",

      tags: ["14th Amend", "Landmark"],
      vote: "7-2",
      author: "Justice Douglas",
      facts: "John Leo Brady and his companion Charles Boblit were both charged with first-degree murder in the killing of William Brooks during a robbery in Maryland on June 27, 1958. Brady admitted participating in the robbery but claimed Boblit did the actual killing. Prior to trial, Brady's counsel requested to examine all of Boblit's extrajudicial statements. The prosecution turned over several of Boblit's statements but withheld one — a written statement in which Boblit admitted that he personally strangled Brooks. This critical confession was not disclosed to Brady's defense team until after Brady had been tried, convicted, and sentenced to death. Had the defense known about Boblit's confession, it would have been powerful evidence supporting Brady's claim that he did not actually commit the murder.",
      proceduralHistory: "Brady was convicted of first-degree murder and sentenced to death in the Circuit Court for Anne Arundel County, Maryland. The Maryland Court of Appeals affirmed the conviction but remanded for retrial on the question of punishment only, holding that suppression of the Boblit confession denied Brady due process as to sentencing (but not guilt). The U.S. Supreme Court granted certiorari.",
      holding: "The suppression by the prosecution of evidence favorable to an accused upon request violates due process where the evidence is material either to guilt or to punishment, irrespective of the good faith or bad faith of the prosecution.",
      reasoning: [
        "The Fourteenth Amendment's Due Process Clause is violated whenever the prosecution suppresses evidence favorable to the accused that is material to the outcome",
        "The focus is on 'the character of the evidence, not the character of the prosecutor' — even inadvertent suppression violates due process",
        "'Society wins not only when the guilty are convicted, but when criminal trials are fair; our system of the administration of justice suffers when any accused is treated unfairly'",
        "The rule applies to both exculpatory evidence (evidence of innocence) and impeachment evidence (evidence undermining a witness's credibility) — as later clarified in Giglio v. United States (1972)",
        "A prosecutor's obligation is to seek justice, not merely to win convictions"
      ],
      keyQuotes: [
        { text: "Society wins not only when the guilty are convicted, but when criminal trials are fair; our system of the administration of justice suffers when any accused is treated unfairly.", attribution: "Justice Douglas, majority opinion" },
        { text: "The suppression by the prosecution of evidence favorable to an accused upon request violates due process where the evidence is material either to guilt or to punishment, irrespective of the good faith or bad faith of the prosecution.", attribution: "Justice Douglas, majority opinion" }
      ],
      significance: "Created the Brady disclosure obligation — one of the cornerstones of American criminal procedure. Prosecutors are constitutionally required to disclose all material exculpatory and impeachment evidence to the defense. The Brady rule has generated a vast body of case law on what constitutes 'materiality.' Brady violations remain one of the most common grounds for post-conviction relief. Despite the rule, studies suggest prosecutors still frequently fail to disclose favorable evidence.",
      dissent: "The ruling on the core principle was effectively unanimous. The disagreement was limited to the remedy: the majority held the suppression required a new trial on punishment only, not on guilt.",
      relatedCases: ["Giglio v. United States (1972)", "United States v. Bagley (1985)", "Kyles v. Whitley (1995)", "Strickler v. Greene (1999)"]

    {
      name: "In re Winship",
      cite: "397 U.S. 358 (1970)",
      year: 1970,
      topic: "Fourteenth Amendment — Due Process",
      subtopic: "Burden of Proof",
      tags: ["14th Amend"],
      vote: "6-3",
      author: "Justice Brennan",
      facts: "A 12-year-old boy, Samuel Winship, was charged as a juvenile delinquent in New York Family Court for an act that, if committed by an adult, would constitute larceny — specifically, stealing $112 from a woman's pocketbook in a locker. Under New York law at the time, juvenile delinquency proceedings used the civil standard of 'preponderance of the evidence' rather than the criminal standard of 'beyond a reasonable doubt.' The Family Court judge acknowledged that the evidence might not establish guilt beyond a reasonable doubt, but expressly found that the preponderance standard was satisfied and adjudicated Winship a juvenile delinquent. He was placed in a training school for an initial period of 18 months, subject to annual extensions until his 18th birthday — potentially six years of confinement for the 12-year-old.",
      proceduralHistory: "Winship was adjudicated delinquent in New York Family Court. The Appellate Division of the New York Supreme Court affirmed. The New York Court of Appeals affirmed (4-3), with the dissenters arguing the reasonable doubt standard should apply. The U.S. Supreme Court granted certiorari.",
      holding: "The Due Process Clause of the Fourteenth Amendment requires proof beyond a reasonable doubt of every fact necessary to constitute the crime charged, in both adult criminal cases and juvenile delinquency proceedings where the juvenile faces potential confinement.",
      reasoning: [
        "The reasonable doubt standard is 'indispensable' to 'command the respect and confidence of the community in applications of the criminal law'",
        "The standard is bottomed on 'a fundamental value determination of our society that it is far worse to convict an innocent man than to let a guilty man go free'",
        "It reduces the risk of factual error in criminal proceedings — protecting against convictions based on uncertain evidence",
        "The standard provides 'concrete substance for the presumption of innocence,' which is the bedrock of criminal justice",
        "Juvenile proceedings that may result in institutional confinement and stigmatization require the same protections — the label 'civil' or 'delinquency' does not diminish the reality of lost liberty",
        "The use of a lesser standard would risk 'convicting' juveniles for acts they did not commit"
      ],
      keyQuotes: [
        { text: "It is critical that the moral force of the criminal law not be diluted by a standard of proof that leaves people in doubt whether innocent men are being condemned.", attribution: "Justice Brennan, majority opinion" },
        { text: "The reasonable-doubt standard plays a vital role in the American scheme of criminal procedure. It is a prime instrument for reducing the risk of convictions resting on factual error.", attribution: "Justice Brennan, majority opinion" }
      ],
      significance: "Constitutionalized the beyond-a-reasonable-doubt standard for all criminal cases at both state and federal levels — a standard previously rooted only in common law tradition. Extended this protection to juvenile delinquency proceedings, continuing the due process revolution in juvenile justice begun by In re Gault (1967). The case is foundational to understanding the allocation of risk in criminal justice: it embodies the preference for letting the guilty go free over convicting the innocent.",
      dissent: "Justice Black dissented, arguing the Constitution does not specify a standard of proof and this matter should be left to the states. Chief Justice Burger also dissented, expressing concern that imposing criminal procedural standards on juvenile proceedings would undermine the rehabilitative purpose of the juvenile justice system. Justice Stewart dissented on similar grounds.",
      relatedCases: ["In re Gault (1967)", "Jackson v. Virginia (1979)", "Apprendi v. New Jersey (2000)", "Sullivan v. Louisiana (1993)"]

    {

      author: "Justice Rehnquist",
      facts: "On May 3, 1978, the Bloomingdale, Illinois Police Department received an anonymous letter alleging that married couple Lance and Susan Gates were engaged in drug trafficking. The letter described their method in detail: Lance would drive to Florida, where Susan would fly ahead; Lance would load the car with drugs while Susan drove it back to Illinois; and they had over $100,000 worth of drugs in their basement. A detective corroborated key details of the tip: Lance Gates had a May 5 reservation on a flight to West Palm Beach; surveillance confirmed he flew to Florida; he was observed taking a taxi to a motel where a car registered to Susan Gates was parked; early the next morning, he and a woman left in the car heading north toward Bloomingdale. Based on the anonymous letter and the detective's corroboration, a judge issued a search warrant for the Gates' home and car. The search uncovered approximately 350 pounds of marijuana in the car's trunk, marijuana and weapons in the home, and other contraband.",
      proceduralHistory: "The trial court ordered suppression of the evidence. The Illinois Appellate Court affirmed. The Illinois Supreme Court also affirmed, applying the Aguilar-Spinelli two-pronged test and finding the anonymous tip deficient because it did not reveal the informant's 'basis of knowledge' or establish 'veracity.' The U.S. Supreme Court granted certiorari.",
      holding: "The rigid Aguilar-Spinelli two-pronged test for evaluating whether an informant's tip establishes probable cause for a search warrant is replaced by a 'totality of the circumstances' analysis. Under this approach, the task of an issuing magistrate is to make a practical, common-sense decision whether, given all the circumstances, there is a fair probability that contraband or evidence of a crime will be found in a particular place.",
      reasoning: [
        "Probable cause is a 'fluid concept — turning on the assessment of probabilities in particular factual contexts — not readily, or even usefully, reduced to a neat set of legal rules'",
        "The Aguilar-Spinelli test's rigid independent requirements of 'veracity/reliability' and 'basis of knowledge' are abandoned as independent prongs",
        "Instead, an informant's veracity, reliability, and basis of knowledge are 'closely intertwined issues' that should be evaluated as part of the totality of circumstances",
        "A deficiency in one factor may be compensated by a strong showing of another, or by independent police corroboration",
        "The corroborated prediction of future behavior (Gates' travel pattern) supports the tip's reliability even when the informant is anonymous",
        "The standard gives 'great deference' to a magistrate's probable cause determination — it should be upheld so long as the magistrate had a 'substantial basis' for concluding probable cause existed"
      ],
      keyQuotes: [
        { text: "The task of the issuing magistrate is simply to make a practical, common-sense decision whether, given all the circumstances set forth in the affidavit before him, there is a fair probability that contraband or evidence of a crime will be found in a particular place.", attribution: "Justice Rehnquist, majority opinion" },
        { text: "Probable cause is a fluid concept — turning on the assessment of probabilities in particular factual contexts — not readily, or even usefully, reduced to a neat set of legal rules.", attribution: "Justice Rehnquist, majority opinion" }
      ],
      significance: "Made it significantly easier for police to obtain search warrants based on tips from informants, including anonymous informants. By replacing the rigid two-pronged test with a flexible totality-of-circumstances approach, the decision gave magistrates more discretion and made probable cause determinations harder to overturn on appeal. The Gates standard remains the governing framework for evaluating informant tips.",
      dissent: "Justices Brennan and Marshall dissented, arguing the Aguilar-Spinelli framework provided essential structure and predictability. They warned the 'totality' test was too amorphous and would effectively 'gut' Fourth Amendment protections by allowing warrants based on unverified anonymous tips. Justice Stevens dissented on different grounds.",

    {

      topic: "Fourth Amendment — Search & Seizure",

      tags: ["4th Amend"],
      vote: "5-4",
      author: "Justice Stevens",
      facts: "On August 25, 1999, acting on an anonymous tip, Tucson police officers went to a residence to investigate suspected narcotics activity. They knocked on the front door, and Rodney Gant answered. He identified himself and stated there was an outstanding warrant for his arrest for driving with a suspended license. The officers left but returned later that evening. When they returned, Gant was not present, but they encountered two other individuals — one was arrested for providing a false name and the other on an outstanding warrant. Both were handcuffed and placed in separate patrol cars. When Gant drove up, he parked at the far end of the driveway and was immediately arrested for the outstanding warrant (driving with suspended license). He too was handcuffed and placed in the back of a patrol car. With all three suspects secured in patrol cars, officers then searched Gant's car and found a gun and a bag of cocaine in a jacket pocket on the back seat.",
      proceduralHistory: "Gant was convicted of drug possession in the Pima County Superior Court after his suppression motion was denied. The Arizona Court of Appeals reversed, holding the search unreasonable because Gant could not have accessed the car at the time of the search. The Arizona Supreme Court affirmed the reversal. The U.S. Supreme Court granted certiorari, noting that lower courts had been divided on how broadly to read New York v. Belton.",
      holding: "Police may search a vehicle incident to the arrest of a recent occupant only when: (1) the arrestee is unsecured and within reaching distance of the passenger compartment at the time of the search (officer safety / evidence preservation rationale), OR (2) it is reasonable to believe that evidence relevant to the crime of arrest might be found in the vehicle (evidence-gathering rationale).",
      reasoning: [
        "Clarified and significantly narrowed New York v. Belton (1981), which had been widely (mis)read by lower courts to authorize a vehicle search after every arrest of a vehicle occupant",
        "The Chimel v. California (1969) rationales — protecting officer safety and preserving evidence — simply do not apply when the arrestee is already handcuffed and secured in a patrol car",
        "An 'untethered' reading of Belton gave 'police officers carte blanche' for warrantless searches, contrary to the Fourth Amendment's purpose",
        "The second prong (evidence related to the crime of arrest) provides a more limited authorization: arresting someone for a traffic violation does not justify searching for drugs, but arresting someone for drug possession may justify a vehicle search",
        "In this case, Gant was arrested for driving with a suspended license, was handcuffed and locked in a patrol car, and there was no reason to believe evidence of the offense would be found in the vehicle"

      keyQuotes: [

        { text: "A rule that gives police the power to conduct such a search whenever an individual is caught committing a traffic offense, when there is no basis for believing evidence of the offense might be found in the vehicle, creates a serious and recurring threat to the privacy of countless individuals.", attribution: "Justice Stevens, majority opinion" }
      ],
      significance: "Significantly restricted when police can search vehicles incident to arrest — a major practical change that eliminated what had become near-automatic vehicle searches after traffic arrests. The decision forced police to articulate a specific justification for vehicle searches, either demonstrating the arrestee could access the car or connecting the search to the crime of arrest.",

      year: 2010,

      subtopic: "Right to Silence",
      tags: ["5th Amend"],
      vote: "5-4",
      author: "Justice Kennedy",
      facts: "On January 10, 2000, a shooting occurred outside a mall in Southfield, Michigan, killing one victim and injuring another. Van Chester Thompkins fled and was arrested about one year later in Ohio. Two Southfield detectives traveled to Ohio and interrogated Thompkins at an Ohio police station. At the beginning, Detective Helgert presented Thompkins with a form listing his Miranda rights. Helgert asked Thompkins to read the fifth warning aloud (to verify he could read English): 'You have the right to decide at any time before or during questioning to use your right to remain silent and your right to talk with a lawyer while you are being questioned.' Thompkins read this aloud but refused to sign the acknowledgment form. The interrogation then proceeded for approximately two hours and 45 minutes. During this time, Thompkins was largely silent — he gave a few limited, monosyllabic responses, but mostly said nothing. He did not say he wanted to remain silent, did not ask for a lawyer, and did not say he did not want to talk. Near the end, Detective Helgert changed tactic and asked: 'Do you believe in God?' Thompkins said 'Yes.' Helgert asked: 'Do you pray to God?' Thompkins said 'Yes.' Helgert then asked: 'Do you pray to God to forgive you for shooting that boy down?' Thompkins answered 'Yes' and looked away. He refused to make a written statement.",
      proceduralHistory: "Thompkins was convicted of first-degree murder in the Wayne County Circuit Court, Michigan. The Michigan Court of Appeals affirmed. The Michigan Supreme Court denied review. Thompkins filed a habeas corpus petition in the U.S. District Court for the Eastern District of Michigan, which denied relief. The Sixth Circuit Court of Appeals reversed, finding Miranda had been violated. The U.S. Supreme Court granted certiorari.",
      holding: "A suspect who has received and understood Miranda warnings and has not invoked his rights waives the right to remain silent by making an uncoerced statement to police. To invoke the right to remain silent, a suspect must do so unambiguously. Merely remaining silent for a prolonged period during interrogation is not an invocation of the right to silence.",
      reasoning: [
        "The unambiguous invocation requirement from Davis v. United States (1994) — which applied to the right to counsel — is extended to the right to silence",

        "Thompkins' silence for nearly three hours, while unusual, did not constitute an invocation — he understood his rights and chose to make a statement",
        "The burden of showing waiver remains on the prosecution, but waiver need not be express"
      ],
      keyQuotes: [
        { text: "A suspect who has received and understood the Miranda warnings, and has not invoked his Miranda rights, waives the right to remain silent by making an uncoerced statement to the police.", attribution: "Justice Kennedy, majority opinion" },
        { text: "If the right to remain silent could be invoked by silence, it would be difficult for police to know when to stop questioning — or even when they might properly begin.", attribution: "Justice Kennedy, majority opinion" }

      significance: "Effectively shifted the practical burden from the police (to obtain a waiver before questioning) to the suspect (to clearly invoke rights to stop questioning). Critics argue this undermines Miranda's protective framework by requiring suspects to speak in order to invoke their right not to speak. Supporters argue it provides clear guidance to officers and recognizes the reality that many suspects choose to engage with investigators.",
      dissent: "Justice Sotomayor, joined by Justices Stevens, Ginsburg, and Breyer, wrote a forceful dissent arguing the decision 'turns Miranda upside down.' She argued that the majority converted Miranda's requirement of an affirmative waiver into a presumption of waiver from silence, noting the 'counterintuitive' result that 'a suspect must speak in order to invoke his right to remain silent.' She warned the decision would encourage police to engage in prolonged interrogations hoping for eventual statements.",
      relatedCases: ["Miranda v. Arizona (1966)", "Davis v. United States (1994)", "North Carolina v. Butler (1979)", "Missouri v. Seibert (2004)"]

    {
      name: "Batson v. Kentucky",
      cite: "476 U.S. 79 (1986)",

      tags: ["14th Amend", "Landmark"],
      vote: "7-2",
      author: "Justice Powell",
      facts: "James Kirkland Batson, a Black man, was indicted on charges of second-degree burglary and receipt of stolen goods in Louisville, Kentucky in 1981. During jury selection (voir dire), the prosecutor used his peremptory challenges to strike all four Black persons on the venire (jury pool), resulting in a jury composed entirely of white persons. Batson's attorney moved to discharge the jury before it was sworn, arguing that the prosecutor's removal of all Black venire members violated Batson's Sixth Amendment right to a jury drawn from a cross-section of the community and his Fourteenth Amendment right to equal protection. The trial judge denied the motion, observing that the parties could use peremptory challenges to 'strike anybody they want to.' The all-white jury convicted Batson on both counts.",
      proceduralHistory: "Batson was convicted in the Jefferson Circuit Court, Kentucky. The Kentucky Supreme Court affirmed, relying on Swain v. Alabama (1965), which required a defendant to show a pattern of discrimination across multiple cases — not just in the defendant's own trial — to establish an equal protection violation. The U.S. Supreme Court granted certiorari to reconsider Swain.",
      holding: "The Equal Protection Clause of the Fourteenth Amendment prohibits prosecutors from exercising peremptory challenges to exclude potential jurors solely on the basis of race. A defendant may establish a prima facie case of purposeful discrimination based solely on the prosecutor's conduct at the defendant's own trial. If a prima facie case is made, the burden shifts to the prosecution to provide a race-neutral explanation for each challenged strike.",
      reasoning: [
        "Racial discrimination in jury selection 'violates a defendant's right to equal protection because it denies him the protection that a trial by jury is intended to secure'",
        "It also 'undermines public confidence in the fairness of our system of justice' and harms the excluded jurors by denying them participation in civic life",
        "Swain's requirement that a defendant prove discrimination across multiple cases placed a 'crippling burden' on defendants — the Court overruled it on this point",
        "The three-step framework: (1) defendant must show facts raising an inference that the prosecutor used peremptory challenges on the basis of race; (2) the burden shifts to the prosecutor to offer a race-neutral explanation (not just saying 'I didn't discriminate'); (3) the trial court determines whether the defendant has established purposeful discrimination",
        "A race-neutral explanation 'need not rise to the level justifying exercise of a challenge for cause' — it just cannot be pretextual"
      ],
      keyQuotes: [
        { text: "The harm from discriminatory jury selection extends beyond that inflicted on the defendant and the excluded juror to touch the entire community. Selection procedures that purposefully exclude black persons from juries undermine public confidence in the fairness of our system of justice.", attribution: "Justice Powell, majority opinion" },
        { text: "The Equal Protection Clause forbids the prosecutor to challenge potential jurors solely on account of their race or on the assumption that black jurors as a group will be unable impartially to consider the State's case against a black defendant.", attribution: "Justice Powell, majority opinion" }
      ],
      significance: "Created the Batson challenge framework, which has become a cornerstone of jury selection procedure. Later extended to gender-based discrimination (J.E.B. v. Alabama, 1994), to challenges by defense attorneys (Georgia v. McCollum, 1992), and to civil cases (Edmonson v. Leesville Concrete, 1991). Despite the framework, racial discrimination in jury selection remains a persistent problem. Studies consistently show that prosecutors continue to disproportionately strike Black jurors, and courts frequently accept facially race-neutral explanations. In Flowers v. Mississippi (2019), the Court reversed a conviction where the same prosecutor had struck 41 of 42 Black prospective jurors across six trials.",
      dissent: "Chief Justice Burger dissented, arguing the decision 'will likely impair the peremptory challenge' and that peremptory challenges are by definition exercised without explanation. Justice Rehnquist also dissented, arguing there is no constitutional basis for requiring an explanation of peremptory challenges and predicting the decision would generate endless litigation.",

      facts: "On August 22, 2009, David Riley was stopped by a San Diego police officer for driving with expired registration tags. The stop revealed that Riley's license had been suspended, and the car was impounded. During an inventory search, officers found two handguns under the car's hood. Riley was arrested for possession of concealed and loaded firearms. An officer then searched Riley incident to arrest and found items associated with the 'Bloods' street gang. A gang unit detective, about two hours after the arrest, searched through Riley's smartphone — a Samsung Instinct M800 — and found photos of Riley standing in front of a car that police suspected had been involved in a recent gang shooting. Based in part on the phone evidence, Riley was charged in connection with the shooting, and at trial, the prosecution introduced photos and videos from the phone showing Riley making gang signs and a video of Riley's car. The case was consolidated with United States v. Wurie, in which a flip phone was searched incident to arrest, and call logs led officers to a stash house containing drugs, a firearm, and cash.",

        { text: "Modern cell phones are not just another technological convenience. With all they contain and all they may reveal, they hold for many Americans 'the privacies of life.' The fact that technology now allows an individual to carry such information in his hand does not make the information any less worthy of the protection for which the Founders fought.", attribution: "Chief Justice Roberts, majority opinion" },

    {

      tags: ["6th Amend"],
      vote: "6-3",
      author: "Justice Stewart",
      facts: "In 1958, Winston Massiah, a merchant seaman, was indicted for violating federal narcotics laws after a large quantity of cocaine was found aboard the S.S. Santa Maria. Massiah retained a lawyer, pled not guilty, and was released on bail. His co-defendant, Jesse Colson, also indicted, decided to cooperate with the government. Without Massiah's knowledge, federal agents installed a radio transmitter under the front seat of Colson's car. On November 19, 1959, Colson engaged Massiah in a lengthy conversation in the car while Agent Murphy listened from a nearby vehicle. During this conversation, Massiah made several incriminating statements about the narcotics operation, including details about his role in importing cocaine. These statements, which were overheard by Agent Murphy and testified to at trial, were damaging to Massiah's defense. At no point did Massiah know he was speaking to a government informant or that the conversation was being monitored. His attorney was not present and had not been informed.",
      proceduralHistory: "Massiah was convicted in the U.S. District Court for the Southern District of New York. The Second Circuit Court of Appeals affirmed the conviction. The U.S. Supreme Court granted certiorari.",
      holding: "Once adversarial judicial proceedings have been initiated against an individual (by indictment, information, arraignment, or preliminary hearing), the Sixth Amendment prohibits the government from deliberately eliciting incriminating statements from the accused in the absence of counsel. Statements obtained in violation of this right are inadmissible at trial.",
      reasoning: [
        "The Sixth Amendment right to counsel attaches at the initiation of formal adversarial judicial proceedings — once a defendant is indicted, he has a right to rely on counsel as 'a medium between him and the government'",
        "After indictment, the government deliberately and surreptitiously used Colson to elicit incriminating statements from Massiah in the absence of his retained attorney",
        "The Sixth Amendment would be rendered meaningless if the government could circumvent the right to counsel through 'secret interrogation' after formal charges",

      keyQuotes: [
        { text: "We hold that the petitioner was denied the basic protections of [the Sixth Amendment] guarantee when there was used against him at his trial evidence of his own incriminating words, which federal agents had deliberately elicited from him after he had been indicted and in the absence of his counsel.", attribution: "Justice Stewart, majority opinion" },
        { text: "Any secret interrogation of the defendant, from and after the finding of the indictment, without the protection afforded by the presence of counsel, contravenes the basic dictates of fairness in the conduct of criminal causes and the fundamentals of due process of law.", attribution: "Justice Stewart, quoting People v. Waterman (NY 1935)" }
      ],
      significance: "Established the Massiah doctrine: once formal criminal proceedings begin, the government cannot deliberately elicit incriminating statements from the accused without counsel present. The rule applies even when the government uses undercover informants and the suspect is unaware of government involvement. Later refined in Brewer v. Williams (1977) (the 'Christian burial speech' case), United States v. Henry (1980) (jail cellmate planted by government), and Kuhlmann v. Wilson (1986) (passive vs. active informants).",

      author: "Justice Stewart",
      facts: "On September 13, 1965, police officers arrived at Ted Chimel's home in Santa Ana, California with a warrant for his arrest on suspicion of burglary of a coin shop. Chimel's wife let the officers in, and when Chimel arrived home, they arrested him and asked to 'look around.' Chimel objected, but officers told him that based on the lawful arrest, they could conduct a search. Over the next 45 minutes to an hour, officers searched the entire three-bedroom house, including the attic, the garage, and a small workshop. They directed Chimel's wife to open drawers and move contents so they could view items underneath. They seized numerous coins, tokens, and medals, which were admitted as evidence at trial. No search warrant had been obtained — the officers relied solely on the arrest warrant.",
      proceduralHistory: "Chimel was convicted of burglary in the Orange County Superior Court. The California Court of Appeal and the California Supreme Court affirmed, relying on the broad search-incident-to-arrest rule from United States v. Rabinowitz (1950). The U.S. Supreme Court granted certiorari.",
      holding: "A search incident to a lawful arrest is limited to the arrestee's person and the area within the arrestee's immediate control — the area from which the arrestee might gain possession of a weapon or destructible evidence ('the grabbing area' or 'wingspan'). The full search of Chimel's house exceeded this permissible scope.",
      reasoning: [
        "The search-incident-to-arrest exception is justified by two rationales: (1) protecting officer safety by removing weapons the arrestee could reach, and (2) preventing the destruction of evidence within the arrestee's reach",

      keyQuotes: [
        { text: "When an arrest is made, it is reasonable for the arresting officer to search the person arrested in order to remove any weapons that the latter might seek to use in order to resist arrest or effect his escape... In addition, it is entirely reasonable for the arresting officer to search for and seize any evidence on the arrestee's person in order to prevent its concealment or destruction.", attribution: "Justice Stewart, majority opinion" },

      ],
      significance: "Established the 'wingspan' or 'grabbing distance' rule that defines the spatial limits of a search incident to arrest. This foundational doctrine has been applied and refined in dozens of subsequent cases, including New York v. Belton (1981) for vehicles and Riley v. California (2014) for cell phones. Chimel remains the starting point for all search-incident-to-arrest analysis.",

    {

      author: "Justice Goldberg",
      facts: "On the night of January 19, 1960, Danny Escobedo's brother-in-law was fatally shot. Escobedo was arrested without a warrant and interrogated at police headquarters. He made no statement, and his lawyer obtained his release on a writ of habeas corpus. Eleven days later, Escobedo was arrested again after his accomplice, Benedict DiGerlando, told police that Escobedo had fired the fatal shots. During the second interrogation, Escobedo repeatedly asked to speak with his attorney, Warren Wolfson, who was present at the police station and repeatedly asked to see his client. Police refused both requests. An officer told Escobedo that DiGerlando had named him as the shooter, and Escobedo confronted DiGerlando, making statements that amounted to admissions of involvement. Escobedo was not advised of his right to remain silent. His incriminating statements were admitted at trial, and he was convicted of murder.",
      proceduralHistory: "Escobedo was convicted of murder in the Circuit Court of Cook County, Illinois. The Illinois Supreme Court initially reversed, then on rehearing affirmed the conviction. The U.S. Supreme Court granted certiorari.",

    {

      tags: ["4th Amend"],
      vote: "5-4",
      author: "Justice Scalia",
      facts: "In 1992, a federal agent suspected Danny Kyllo of growing marijuana inside his home in Florence, Oregon, based on tips and subpoenaed utility records showing unusually high electricity usage. On January 16, 1992, at 3:20 a.m., the agent used a thermal imaging device (an Agema Thermovision 210) from a parked car across the street to scan Kyllo's triplex home. The scan took only a few minutes and revealed that the roof over the garage and a side wall were relatively hot compared to the rest of the home and substantially warmer than neighboring units — consistent with the use of high-intensity lamps for indoor marijuana cultivation. Based on the thermal imaging, tips, and utility records, the agent obtained a search warrant. The search revealed an indoor marijuana growing operation with over 100 plants.",

  ],
  "Escobedo v. Illinois": [
    "Critical precursor to Miranda. Established that the right to counsel applies during custodial interrogation. 'No system of criminal justice can, or should, survive if it comes to depend for its continued effectiveness on the citizens' abdication through unawareness of their constitutional rights.'",
    "Narrow holding limited to suspects who request counsel — soon superseded by Miranda's broader protections. Marked the Court's shift from a voluntariness-based approach to a rights-based approach for interrogation."
  ],
  "New Jersey v. T.L.O.": [
    "School searches: Fourth Amendment applies to searches by public school officials — they are state actors, students don't shed constitutional rights at the schoolhouse gate. But warrant and probable cause requirements are impractical in the school setting.",
    "Two-part test: search must be (1) justified at its inception (reasonable grounds for suspecting it will turn up evidence of a rule or law violation) AND (2) reasonable in scope (measures reasonably related to objectives, not excessively intrusive given student's age and sex and nature of infraction)."
  ]
};

let selectedTopic = null;
let selectedSubtopic = null;
let selectedCase = null;
let notes = {};

function init() {
  renderTopicTree();
  renderCases();
}

function renderTopicTree() {
  const tree = document.getElementById('topicTree');
  tree.innerHTML = '';

  const allItem = document.createElement('div');
  allItem.className = 'topic-item' + (selectedTopic === null ? ' active' : '');
  allItem.innerHTML = '<span style="width:12px"></span> All Cases';
  allItem.onclick = () => { selectedTopic = null; selectedSubtopic = null; renderTopicTree(); renderCases(); };
  tree.appendChild(allItem);

  DATA.topics.forEach(topic => {
    const isExpanded = selectedTopic === topic.name;
    const item = document.createElement('div');
    item.className = 'topic-item' + (selectedTopic === topic.name && !selectedSubtopic ? ' active' : '') + (isExpanded ? ' expanded' : '');
    item.innerHTML = `<span class="arrow">&#9654;</span> ${topic.name.split('\u2014')[0].trim()}`;
    item.onclick = () => {
      selectedTopic = topic.name;
      selectedSubtopic = null;
      renderTopicTree();
      renderCases();
    };
    tree.appendChild(item);

    const subtopics = document.createElement('div');
    subtopics.className = 'subtopics' + (isExpanded ? ' open' : '');
    topic.subtopics.forEach(sub => {
      const subItem = document.createElement('div');
      subItem.className = 'subtopic-item' + (selectedSubtopic === sub ? ' active' : '');
      subItem.textContent = sub;
      subItem.onclick = (e) => {
        e.stopPropagation();
        selectedTopic = topic.name;
        selectedSubtopic = sub;
        renderTopicTree();
        renderCases();
      };
      subtopics.appendChild(subItem);
    });
    tree.appendChild(subtopics);
  });
}

function getFilteredCases() {
  return DATA.cases.filter(c => {
    if (selectedTopic && c.topic !== selectedTopic) return false;
    if (selectedSubtopic && c.subtopic !== selectedSubtopic) return false;
    return true;
  });
}

function renderCases(filter = '') {
  const list = document.getElementById('caseList');
  const title = document.getElementById('topicTitle');
  const subtitle = document.getElementById('topicSubtitle');

  if (selectedSubtopic) {
    title.textContent = selectedSubtopic;
    subtitle.textContent = selectedTopic;
  } else if (selectedTopic) {
    title.textContent = selectedTopic;
    subtitle.textContent = `${getFilteredCases().length} cases`;
  } else {
    title.textContent = 'All Cases';
    subtitle.textContent = `${DATA.cases.length} landmark cases in criminal procedure`;
  }

  let cases = getFilteredCases();
  if (filter) {
    const f = filter.toLowerCase();
    cases = cases.filter(c =>
      c.name.toLowerCase().includes(f) ||
      c.holding.toLowerCase().includes(f) ||
      c.facts.toLowerCase().includes(f) ||
      c.subtopic.toLowerCase().includes(f)
    );
  }

  cases.sort((a, b) => a.year - b.year);

  list.innerHTML = '';
  cases.forEach(c => {
    const card = document.createElement('div');
    card.className = 'case-card' + (selectedCase === c.name ? ' active' : '');
    const tagClass = c.topic.includes('Fourth') ? 'tag-4th' :
                     c.topic.includes('Fifth') ? 'tag-5th' :
                     c.topic.includes('Sixth') ? 'tag-6th' : 'tag-14th';
    card.innerHTML = `
      <div class="case-name">${c.name}</div>
      <div class="case-cite">${c.cite} &middot; ${c.vote}</div>
      <div class="case-snippet">${c.holding.substring(0, 140)}...</div>
      <div class="tags">
        ${c.tags.map(t => `<span class="tag ${t === 'Landmark' ? 'tag-landmark' : tagClass}">${t}</span>`).join('')}
      </div>
    `;
    card.onclick = () => { selectedCase = c.name; renderCases(filter); renderDetail(c); };
    list.appendChild(card);
  });
}

function renderDetail(c) {
  const panel = document.getElementById('detailPanel');
  const noteKey = c.name;
  const hasNote = notes[noteKey];
  const tagClass = c.topic.includes('Fourth') ? 'tag-4th' :
                   c.topic.includes('Fifth') ? 'tag-5th' :
                   c.topic.includes('Sixth') ? 'tag-6th' : 'tag-14th';

  panel.innerHTML = `
    <div class="detail-header">
      <h3>${c.name}</h3>
      <div class="cite">${c.cite}</div>
      <div class="detail-meta">
        <div class="meta-item"><strong>Vote:</strong> ${c.vote}</div>
        <div class="meta-item"><strong>Author:</strong> ${c.author}</div>
        <div class="meta-item"><strong>Year:</strong> ${c.year}</div>
        <div class="meta-item"><strong>Topic:</strong> ${c.subtopic}</div>
      </div>
      <div class="tags" style="margin-top:0.5rem">
        ${c.tags.map(t => `<span class="tag ${t === 'Landmark' ? 'tag-landmark' : tagClass}">${t}</span>`).join('')}
      </div>
    </div>

    <div class="detail-section">
      <h4>Facts</h4>
      <p>${c.facts}</p>
    </div>

    <div class="detail-section">
      <h4>Procedural History</h4>
      <p>${c.proceduralHistory}</p>
    </div>

    <div class="detail-section">
      <h4>Holding</h4>
      <div class="holding-box">${c.holding}</div>
    </div>

    <div class="detail-section">
      <h4>Reasoning</h4>
      <ul>${c.reasoning.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>

    ${c.keyQuotes ? `<div class="detail-section">
      <h4>Key Quotes</h4>
      ${c.keyQuotes.map(q => `<div class="quote-box">"${q.text}"<div class="attribution">— ${q.attribution}</div></div>`).join('')}
    </div>` : ''}

    <div class="detail-section">
      <h4>Significance</h4>
      <p>${c.significance}</p>
    </div>

    ${c.dissent ? `<div class="detail-section">
      <h4>Dissent</h4>
      <p>${c.dissent}</p>
    </div>` : ''}

    ${c.relatedCases ? `<div class="detail-section">
      <h4>Related Cases</h4>
      <div class="related-cases">
        ${c.relatedCases.map(rc => `<span class="related-case" onclick="jumpToCase('${rc.split(' (')[0]}')">${rc}</span>`).join('')}
      </div>
    </div>` : ''}

    ${CLASS_NOTES[c.name] ? `<div class="detail-section">
      <h4>Class Notes</h4>
      ${CLASS_NOTES[c.name].map(n => `<div class="class-note">${n}</div>`).join('')}
    </div>` : ''}

    <div class="detail-section">
      <h4>Your Notes</h4>
      ${hasNote
        ? `<div class="note-text" onclick="editNote('${noteKey}')">${notes[noteKey]}</div>`
        : `<button class="add-note" onclick="editNote('${noteKey}')">+ Add study notes for this case...</button>`
      }
    </div>
  `;
}

function jumpToCase(name) {
  const c = DATA.cases.find(cs => cs.name === name);
  if (c) {
    selectedCase = c.name;
    selectedTopic = c.topic;
    selectedSubtopic = null;
    renderTopicTree();
    renderCases();
    renderDetail(c);
  }
}

function editNote(key) {
  const section = document.querySelector('.detail-section:last-child');
  section.innerHTML = `
    <h4>Your Notes</h4>
    <textarea class="note-input" id="noteInput" placeholder="Add your notes, analysis, or exam tips...">${notes[key] || ''}</textarea>
  `;
  const input = document.getElementById('noteInput');
  input.focus();
  input.onblur = () => {
    const val = input.value.trim();
    if (val) notes[key] = val;
    else delete notes[key];
    const c = DATA.cases.find(c => c.name === key);
    if (c) renderDetail(c);
  };
}

function filterCases(val) {
  renderCases(val);
}

function exportToWord() {
  // Build HTML content for the Word document
  let cases = selectedTopic ? getFilteredCases() : DATA.cases;
  cases.sort((a, b) => a.year - b.year);

  // Group cases by topic
  const grouped = {};
  DATA.topics.forEach(t => { grouped[t.name] = []; });
  cases.forEach(c => {
    if (grouped[c.topic]) grouped[c.topic].push(c);
  });

  let html = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.5; color: #222; margin: 1in; }
  h1 { font-size: 22pt; text-align: center; margin-bottom: 4pt; color: #333; }
  .doc-subtitle { text-align: center; font-size: 11pt; color: #666; margin-bottom: 24pt; }
  h2 { font-size: 16pt; color: #2c4a1e; border-bottom: 2pt solid #2c4a1e; padding-bottom: 4pt; margin-top: 28pt; margin-bottom: 12pt; page-break-before: auto; }
  h3 { font-size: 14pt; color: #333; margin-top: 20pt; margin-bottom: 6pt; }
  .case-cite { font-size: 11pt; color: #666; margin-bottom: 2pt; }
  .case-meta { font-size: 10pt; color: #888; margin-bottom: 10pt; }
  .section-label { font-size: 10pt; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #8b5e3c; margin-top: 10pt; margin-bottom: 4pt; }
  .holding { background: #f5ebe0; border-left: 3pt solid #8b5e3c; padding: 8pt 12pt; font-style: italic; margin: 8pt 0; }
  .quote { background: #f8f6f3; border-left: 3pt solid #c4b5a3; padding: 6pt 10pt; font-style: italic; color: #555; margin: 6pt 0; }
  .quote-attr { font-style: normal; font-size: 9pt; color: #999; margin-top: 3pt; }
  ul { margin-left: 18pt; }
  li { margin-bottom: 4pt; }
  p { margin-bottom: 6pt; }
  .related { font-size: 10pt; color: #666; }
  .note { background: #ffffed; border: 1pt solid #e6e6b8; padding: 8pt; margin: 6pt 0; font-size: 11pt; }
  .note-label { font-size: 9pt; font-weight: bold; color: #8b7e2a; text-transform: uppercase; }
  .toc-entry { margin-left: 20pt; font-size: 11pt; margin-bottom: 2pt; }
  .page-break { page-break-before: always; }
</style>
</head>
<body>
<h1>Criminal Procedure Case Outline</h1>
<p class="doc-subtitle">CaseOutliner Export &mdash; ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p>

<h2>Table of Contents</h2>
`;

  // TOC
  DATA.topics.forEach(topic => {
    if (grouped[topic.name] && grouped[topic.name].length > 0) {
      html += `<p style="font-weight:bold; margin-top:8pt; margin-bottom:2pt;">${topic.name}</p>`;
      grouped[topic.name].forEach(c => {
        html += `<p class="toc-entry">${c.name}, ${c.cite}</p>`;
      });
    }
  });

  // Cases by topic
  DATA.topics.forEach(topic => {
    if (!grouped[topic.name] || grouped[topic.name].length === 0) return;
    html += `<h2 class="page-break">${topic.name}</h2>`;

    grouped[topic.name].forEach(c => {
      html += `
<h3>${c.name}</h3>
<p class="case-cite">${c.cite}</p>
<p class="case-meta">Vote: ${c.vote} | Author: ${c.author} | Topic: ${c.subtopic}</p>

<p class="section-label">Facts</p>
<p>${c.facts}</p>

<p class="section-label">Procedural History</p>
<p>${c.proceduralHistory}</p>

<p class="section-label">Holding</p>
<div class="holding">${c.holding}</div>

<p class="section-label">Reasoning</p>
<ul>${c.reasoning.map(r => `<li>${r}</li>`).join('')}</ul>
`;

      if (c.keyQuotes && c.keyQuotes.length > 0) {
        html += `<p class="section-label">Key Quotes</p>`;
        c.keyQuotes.forEach(q => {
          html += `<div class="quote">"${q.text}"<p class="quote-attr">&mdash; ${q.attribution}</p></div>`;
        });
      }

      html += `
<p class="section-label">Significance</p>
<p>${c.significance}</p>
`;

      if (c.dissent) {
        html += `<p class="section-label">Dissent</p><p>${c.dissent}</p>`;
      }

      if (c.relatedCases) {
        html += `<p class="section-label">Related Cases</p><p class="related">${c.relatedCases.join(' &bull; ')}</p>`;
      }

      if (CLASS_NOTES[c.name]) {
        html += `<p class="section-label">Class Notes</p>`;
        CLASS_NOTES[c.name].forEach(n => {
          html += `<div style="background:#f0f4ff; border-left:3pt solid #5b7fb5; padding:6pt 10pt; margin:4pt 0; font-size:11pt;">${n}</div>`;
        });
      }

      if (notes[c.name]) {
        html += `<div class="note"><p class="note-label">Personal Notes</p><p>${notes[c.name]}</p></div>`;
      }

      html += `<hr style="border:none; border-top:1pt solid #ddd; margin: 16pt 0;">`;
    });
  });

  html += `</body></html>`;

  // Open in new window for print-to-PDF
  const printWin = window.open('', '_blank');
  printWin.document.write(html);
  printWin.document.close();
  setTimeout(() => { printWin.print(); }, 500);
}

init();
</script>
</body>
</html>
